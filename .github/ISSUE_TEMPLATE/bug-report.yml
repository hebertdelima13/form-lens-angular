name: Bug report
description: Report a bug or broken behavior in FormLens
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to help reproduce the issue.

  - type: input
    id: angular-version
    attributes:
      label: Angular version
      placeholder: ex. 21.0.0
    validations:
      required: true

  - type: input
    id: formlens-version
    attributes:
      label: FormLens version
      placeholder: ex. 0.1.0-alpha.1
    validations:
      required: true

  - type: textarea
    id: form-structure
    attributes:
      label: Form structure
      description: Describe the form shape involved, including FormGroup, FormArray, nesting, and dynamic controls.
      placeholder: ex. profile form with nested address group and aliases FormArray
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the panel
        2. Select Profile form
        3. Add an alias
        4. Observe broken highlight
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or console output
      description: Paste screenshots, errors, or logs if relevant.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add any other context that may help.